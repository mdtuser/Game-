<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>স্মার্ট ক্যালকুলেটর</title>
<style>
    * {
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #2193b0, #6dd5ed);
    }
    .calculator {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        width: 320px;
        padding: 20px;
    }
    .display {
        width: 100%;
        height: 60px;
        border: none;
        background: #f1f1f1;
        border-radius: 10px;
        text-align: right;
        font-size: 2em;
        padding: 10px;
        margin-bottom: 15px;
        outline: none;
    }
    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    button {
        height: 60px;
        border: none;
        border-radius: 10px;
        font-size: 1.3em;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover {
        transform: scale(1.05);
    }
    .operator {
        background: #ffb74d;
        color: #000;
    }
    .equals {
        background: #4caf50;
        color: #fff;
        grid-column: span 2;
    }
    .clear {
        background: #f44336;
        color: #fff;
        grid-column: span 2;
    }
    .number {
        background: #e0e0e0;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="equals" onclick="calculateResult()">=</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculateResult() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
